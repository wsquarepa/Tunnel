name = "tunnel"
main = "build/worker/shim.mjs"
compatibility_date = "2025-10-31"

[build]
command = "worker-build --release"

[durable_objects]
bindings = [{ name = "TUNNEL", class_name = "TunnelSession" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TunnelSession"]

# database_id is a placeholder; a real id is only needed for remote deploy.
[[d1_databases]]
binding = "DB"
database_name = "tunnel"
database_id = "REPLACE_WITH_REAL_ID_FROM_wrangler_d1_create"

# The panel is a static bundle served only through the ASSETS binding from
# `admin::handle`. `run_worker_first` keeps the Worker in front of every request
# so static files never auto-serve at public tunnel paths (e.g. `/` or `/app.js`).
[assets]
directory = "panel"
binding = "ASSETS"
run_worker_first = true

[vars]
# Set to your wildcard apex (e.g. "tunnel.example.com") to enable subdomain mode.
# Leave empty/unset on workers.dev to use path mode only.
APEX_HOST = ""
