name = "tunnel"
main = "build/worker/shim.mjs"
compatibility_date = "2025-10-31"

[build]
command = "worker-build --release"

[durable_objects]
bindings = [{ name = "TUNNEL", class_name = "TunnelSession" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TunnelSession"]

# D1 is added in Task 2. The Task 1 spike DO does not use D1, and a placeholder
# database_id blocks `wrangler dev --local` from starting, so it stays disabled here.
