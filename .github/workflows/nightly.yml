name: nightly
on:
  push:
    branches: [master]
    paths:
      - "crates/tunnel-client/**"
      - "crates/tunnel-protocol/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/nightly.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest, apt: gcc-aarch64-linux-gnu }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest, apt: musl-tools }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross toolchain
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}
      - name: Build
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          RUSTFLAGS: ${{ runner.os == 'Windows' && '-C target-feature=+crt-static' || '' }}
        run: cargo build --release -p tunnel-client --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          ext=""
          [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          cp "target/${{ matrix.target }}/release/tunnel-client$ext" "tunnel-client-${{ matrix.target }}$ext"
      - uses: actions/upload-artifact@v4
        with:
          name: tunnel-client-${{ matrix.target }}
          path: tunnel-client-${{ matrix.target }}*
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Refresh the rolling nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --yes --cleanup-tag || true
          gh release create nightly dist/* \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Nightly build" \
            --notes "Rolling build of tunnel-client from the latest master push (${GITHUB_SHA})."
