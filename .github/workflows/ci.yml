name: ci
on:
  pull_request:
  push:
    branches: [master]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - run: cargo fmt --all --check
      - run: cargo test -p tunnel-protocol -p tunnel-client
      - run: cargo clippy -p tunnel-protocol -p tunnel-client -- -D warnings
      - run: cargo clippy -p tunnel-worker --target wasm32-unknown-unknown -- -D warnings
